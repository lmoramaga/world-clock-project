<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>World Clock-Lina Moramaga</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>
      <select>
        <option value="">Select a city...</option>
        <option value="">Moscow</option>
        <option value="">Tokyo</option>
        <option value="">South Africa</option>
      </select>

      <div class="cities">
        <div class="city">
          <div>
            <h2>Paris</h2>
            <div class="date">19th June 2026</div>
          </div>
          <div class="time">12:34 PM</div>
        </div>

        <div class="city">
          <div>
            <h2>Lisbon</h2>
            <div class="date">19th June 2026</div>
          </div>
          <div class="time">12:34 PM</div>
        </div>

        <div class="city">
          <div>
            <h2>Berlin</h2>
            <div class="date">19th June 2026</div>
          </div>
          <div class="time">12:34 PM</div>
        </div>
      </div>
    </div>

    <footer>
      This project was coded with 💕 by <strong>Lina Moramaga</strong> and is
      <a href="https://github.com/lmoramaga/world-clock-project" target="_blank"
        >open-sourced</a
      >
    </footer>
  </body>
</html>
